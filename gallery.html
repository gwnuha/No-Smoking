<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>금연 서약서 취합</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --deep:#0a0f1e;
  --gold:#c9a84c;
  --gold2:#f0d080;
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  background:var(--deep);
  font-family:'Noto Serif KR',serif;
  padding:0 24px 60px;
  position:relative;
  overflow-x:hidden;
}

#starCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ── HEADER ── */
.header{
  position:relative;z-index:1;
  text-align:center;
  padding:52px 20px 36px;
  animation:fadeDown .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}

.header-badge{
  display:inline-block;
  font-size:.72rem;letter-spacing:.35em;
  color:var(--gold);
  border:1px solid rgba(201,168,76,.4);
  padding:5px 18px;border-radius:30px;
  margin-bottom:16px;
  background:rgba(201,168,76,.06);
}
.header-title{
  font-family:'Nanum Myeongjo',serif;
  font-size:clamp(1.6rem,4vw,2.6rem);
  font-weight:800;color:#fff;
  letter-spacing:.18em;
  text-shadow:0 0 40px rgba(201,168,76,.3);
}
.header-title span{color:var(--gold);}
.header-sub{
  font-size:.85rem;color:rgba(255,255,255,.4);
  letter-spacing:.1em;margin-top:10px;
}
.header-line{
  display:flex;align-items:center;gap:12px;
  justify-content:center;margin-top:18px;
}
.header-line::before,.header-line::after{
  content:'';width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.header-line-diamond{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);}

/* ── 카운트 배지 ── */
.count-bar{
  position:relative;z-index:1;
  text-align:center;margin-bottom:28px;
}
.count-badge{
  display:inline-block;
  background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.3);
  color:var(--gold2);
  font-size:.88rem;letter-spacing:.08em;
  padding:8px 24px;border-radius:30px;
}

/* ── GRID ── */
.grid{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  max-width:1200px;
  margin:0 auto;
  animation:fadeUp .8s .2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.grid{grid-template-columns:1fr;}}

/* ── 카드 ── */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.2);
  border-radius:6px;
  overflow:hidden;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 12px 36px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.4);
  border-color:rgba(201,168,76,.5);
}
.card img{
  width:100%;display:block;
  aspect-ratio:3/4;object-fit:cover;
  background:#f5e9c8;
}
.card-footer{
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.card-name{
  font-family:'Nanum Myeongjo',serif;
  font-size:.92rem;font-weight:700;
  color:rgba(255,255,255,.85);
}
.card-date{
  font-size:.72rem;color:rgba(255,255,255,.35);
  letter-spacing:.04em;
}

/* ── 빈 상태 ── */
.empty{
  position:relative;z-index:1;
  text-align:center;padding:80px 20px;
  color:rgba(255,255,255,.3);
}
.empty-icon{font-size:3rem;margin-bottom:16px;}
.empty-text{font-size:1rem;letter-spacing:.08em;}

/* ── 로딩 ── */
.loading{
  position:relative;z-index:1;
  text-align:center;padding:80px 20px;
}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(201,168,76,.2);
  border-top-color:var(--gold2);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{color:rgba(255,255,255,.4);font-size:.9rem;letter-spacing:.08em;}

/* ── 모달 (클릭시 크게 보기) ── */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(8px);
  z-index:500;
  align-items:center;justify-content:center;
  padding:20px;
}
.modal.show{display:flex;}
.modal-inner{
  position:relative;
  max-width:520px;width:100%;
  animation:popIn .3s cubic-bezier(.22,1,.36,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.modal-inner img{width:100%;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-close{
  position:absolute;top:-14px;right:-14px;
  width:32px;height:32px;border-radius:50%;
  background:var(--gold);color:#fff;border:none;
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.modal-name{
  text-align:center;margin-top:14px;
  font-family:'Nanum Myeongjo',serif;
  font-size:1.1rem;color:rgba(255,255,255,.8);
}

/* ── 새로고침 버튼 ── */
.refresh-btn{
  position:relative;z-index:1;
  display:block;margin:0 auto 32px;
  background:transparent;
  border:1px solid rgba(201,168,76,.4);
  color:var(--gold);
  font-family:'Noto Serif KR',serif;
  font-size:.85rem;letter-spacing:.08em;
  padding:9px 26px;border-radius:30px;
  cursor:pointer;transition:all .2s;
}
.refresh-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="header">
  <div class="header-badge">학생회 금연 캠페인 2026</div>
  <h1 class="header-title">서약서 <span>취합 현황</span></h1>
  <p class="header-sub">함께 만들어가는 금연의 약속</p>
  <div class="header-line"><div class="header-line-diamond"></div></div>
</div>

<div class="count-bar">
  <span class="count-badge" id="countBadge">불러오는 중...</span>
</div>

<button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-txt">서약서를 불러오는 중...</div>
  </div>
</div>

<!-- 모달 -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-inner">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">✕</button>
    <img id="modalImg" src="" alt="서약서"/>
    <div class="modal-name" id="modalName"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwHonGTxFLSaLV7I6geEzVTQJHKxzxvizE5_cFKz6DbvEeHexPjO_J-EiSUFW5pdslIXQ/exec';

async function loadData(){
  document.getElementById('content').innerHTML=`
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-txt">서약서를 불러오는 중...</div>
    </div>`;
  document.getElementById('countBadge').textContent='불러오는 중...';

  try{
    const res = await fetch(API+'?t='+Date.now());
    const json = await res.json();
    const data = json.data || [];

    document.getElementById('countBadge').textContent =
      `총 ${data.length}명이 금연을 서약했습니다 🎉`;

    if(data.length===0){
      document.getElementById('content').innerHTML=`
        <div class="empty">
          <div class="empty-icon">📜</div>
          <div class="empty-text">아직 제출된 서약서가 없어요</div>
        </div>`;
      return;
    }

    // 최신순 정렬
    const sorted = [...data].reverse();

    const grid = document.createElement('div');
    grid.className='grid';

    sorted.forEach(item=>{
      const card = document.createElement('div');
      card.className='card';
      const dateStr = item.date ? String(item.date).split('T')[0] : '';
      card.innerHTML=`
        <img src="${item.image}" alt="${item.name}" loading="lazy"/>
        <div class="card-footer">
          <span class="card-name">${item.name||'익명'}</span>
          <span class="card-date">${item.date||''}</span>
        </div>`;
      card.querySelector('img').addEventListener('click',()=>openModal(item.image, item.name));
      grid.appendChild(card);
    });

    document.getElementById('content').innerHTML='';
    document.getElementById('content').appendChild(grid);

  }catch(e){
    document.getElementById('content').innerHTML=`
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">데이터를 불러오지 못했어요<br/>잠시 후 다시 시도해주세요</div>
      </div>`;
    document.getElementById('countBadge').textContent='불러오기 실패';
  }
}

function openModal(src, name){
  document.getElementById('modalImg').src=src;
  document.getElementById('modalName').textContent=name||'';
  document.getElementById('modal').classList.add('show');
}
function closeModal(e){
  if(e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('show');
}

/* ── 별 배경 ── */
(function(){
  const c=document.getElementById('starCanvas');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;
    stars=[];
    for(let i=0;i<140;i++) stars.push({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.1+.2,a:Math.random(),
      da:(Math.random()-.5)*.007,speed:Math.random()*.12+.04
    });
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;
      s.y+=s.speed;if(s.y>c.height)s.y=0;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,245,200,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

loadData();
</script>
</body>
</html>
