<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>금연 서약서</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --deep: #0a0f1e;
  --navy: #0d1b3e;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --cream: #fdf6e3;
  --ink: #1a1a2e;
  --red: #b52b27;
  --smoke: rgba(255,255,255,0.04);
}

*{box-sizing:border-box;margin:0;padding:0;}

/* ─── BACKGROUND ─── */
body {
  min-height:100vh;
  background: var(--deep);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:0 16px 60px;
  overflow-x:hidden;
  position:relative;
}

/* 별빛 캔버스 */
#starCanvas {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

/* 빛 번짐 */
.glow-orb {
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.18),transparent 70%);top:-120px;left:-100px;animation:orbFloat 8s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(13,27,62,.6),transparent 70%);bottom:-80px;right:-80px;animation:orbFloat 10s ease-in-out infinite reverse;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,20px);}}

/* ─── HERO HEADER ─── */
.hero {
  position:relative;
  z-index:1;
  text-align:center;
  padding:56px 20px 40px;
  animation:fadeDown .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px);}to{opacity:1;transform:translateY(0);}}

.hero-badge {
  display:inline-block;
  font-family:'Noto Serif KR',serif;
  font-size:.72rem;
  letter-spacing:.35em;
  color:var(--gold);
  border:1px solid rgba(201,168,76,.4);
  padding:5px 18px;
  border-radius:30px;
  margin-bottom:18px;
  backdrop-filter:blur(4px);
  background:rgba(201,168,76,.06);
}
.hero-title {
  font-family:'Nanum Myeongjo',serif;
  font-size:clamp(2rem,6vw,3.4rem);
  font-weight:800;
  color:#fff;
  letter-spacing:.18em;
  line-height:1.15;
  text-shadow:0 0 60px rgba(201,168,76,.3);
}
.hero-title span{color:var(--gold);}
.hero-sub {
  font-family:'Noto Serif KR',serif;
  font-size:.88rem;
  color:rgba(255,255,255,.45);
  letter-spacing:.12em;
  margin-top:12px;
}

/* 제목 밑 장식선 */
.hero-line {
  display:flex;align-items:center;gap:12px;
  justify-content:center;margin-top:20px;
}
.hero-line::before,.hero-line::after{
  content:'';width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.hero-line-diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);}

/* ─── PLEDGE CARD (입력용) ─── */
.card-wrap {
  position:relative;z-index:1;
  width:100%;max-width:640px;
  animation:fadeUp .9s .3s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

.pledge-card {
  background:linear-gradient(160deg,#fdf8ee 0%,#f7edcf 100%);
  border:2px solid var(--gold);
  border-radius:4px;
  padding:44px 48px;
  position:relative;
  box-shadow:0 0 0 6px rgba(201,168,76,.08),0 20px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.8);
}

/* 모서리 장식 */
.corner{position:absolute;width:28px;height:28px;border-color:var(--gold);border-style:solid;}
.corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;}
.corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;}
.corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;}
.corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;}

/* 내부 장식 패턴 */
.card-pattern {
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(201,168,76,.08) 1px,transparent 1px);
  background-size:28px 28px;
  border-radius:4px;
  pointer-events:none;
}

.card-org {
  text-align:center;
  font-family:'Nanum Myeongjo',serif;
  font-size:.78rem;
  letter-spacing:.3em;
  color:var(--gold);
  margin-bottom:6px;
  position:relative;z-index:1;
}
.card-title {
  font-family:'Nanum Myeongjo',serif;
  font-size:2rem;
  font-weight:800;
  text-align:center;
  color:var(--ink);
  letter-spacing:.22em;
  margin-bottom:6px;
  position:relative;z-index:1;
}
.card-divider {
  display:flex;align-items:center;gap:8px;
  margin:0 auto 24px;width:70%;
  position:relative;z-index:1;
}
.card-divider::before,.card-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.card-divider-icon{color:var(--gold);font-size:13px;}

.card-body {
  font-family:'Noto Serif KR',serif;
  font-size:.93rem;
  line-height:2;
  color:#3a3020;
  text-align:justify;
  margin-bottom:24px;
  position:relative;z-index:1;
}

/* 입력 필드 */
.field-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;position:relative;z-index:1;}
.field-label{font-family:'Nanum Myeongjo',serif;font-size:.95rem;color:var(--ink);white-space:nowrap;min-width:52px;}
.field-input{
  flex:1;background:transparent;border:none;
  border-bottom:1.5px solid rgba(100,80,20,.3);
  font-family:'Nanum Myeongjo',serif;font-size:1rem;
  color:var(--ink);padding:5px 6px;outline:none;
  transition:border-color .25s,box-shadow .25s;
}
.field-input:focus{border-bottom-color:var(--gold);box-shadow:0 2px 0 rgba(201,168,76,.2);}

.memo-label{font-family:'Noto Serif KR',serif;font-size:.82rem;color:#7a6630;margin-bottom:6px;position:relative;z-index:1;}
.field-textarea{
  width:100%;min-height:76px;
  background:rgba(201,168,76,.05);
  border:1px dashed rgba(201,168,76,.4);
  border-radius:2px;
  font-family:'Noto Serif KR',serif;font-size:.9rem;
  color:var(--ink);padding:10px 12px;outline:none;
  resize:vertical;line-height:1.9;
  transition:border-color .25s;
  margin-bottom:24px;
  position:relative;z-index:1;
}
.field-textarea:focus{border-color:var(--gold);}
.field-textarea::placeholder,.field-input::placeholder{color:rgba(100,80,20,.35);}

/* 결문 */
.pledge-closing {
  font-family:'Nanum Myeongjo',serif;
  font-size:1.08rem;font-weight:700;
  text-align:center;color:var(--ink);
  line-height:2.1;
  border:1px solid rgba(201,168,76,.5);
  border-radius:2px;
  padding:16px 20px;
  margin-bottom:28px;
  background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));
  position:relative;z-index:1;
}

/* 날짜 & 서명 */
.bottom-row {
  display:flex;justify-content:space-between;align-items:flex-end;
  position:relative;z-index:1;
}
.date-text{
  font-family:'Nanum Myeongjo',serif;
  font-size:.88rem;color:#7a6630;
}
.sign-item{display:flex;align-items:baseline;gap:8px;}
.sign-item .field-label{min-width:40px;font-size:.9rem;}
.sign-item .field-input{min-width:110px;}

/* 도장 */
.seal {
  position:absolute;bottom:44px;right:48px;
  width:68px;height:68px;
  border:2.5px solid var(--red);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Nanum Myeongjo',serif;
  font-size:.78rem;font-weight:700;
  color:var(--red);
  opacity:.7;
  letter-spacing:.04em;
  transform:rotate(-14deg);
  pointer-events:none;
  text-align:center;line-height:1.4;
  z-index:2;
  animation:sealAppear 1.2s 1s cubic-bezier(.22,1,.36,1) both;
}
@keyframes sealAppear{from{opacity:0;transform:rotate(-14deg) scale(.4);}to{opacity:.7;transform:rotate(-14deg) scale(1);}}

/* ─── BUTTONS ─── */
.actions {
  position:relative;z-index:1;
  margin-top:28px;
  display:flex;gap:14px;justify-content:center;
  animation:fadeUp .9s .6s cubic-bezier(.22,1,.36,1) both;
}
.btn{
  font-family:'Noto Serif KR',serif;
  font-size:.9rem;font-weight:600;
  padding:13px 34px;border:none;cursor:pointer;
  letter-spacing:.06em;transition:all .25s;border-radius:2px;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .2s;
}
.btn:hover::after{background:rgba(255,255,255,.1);}

.btn-reset{
  background:transparent;color:rgba(255,255,255,.55);
  border:1px solid rgba(255,255,255,.2);
}
.btn-reset:hover{border-color:rgba(255,255,255,.5);color:#fff;}

.btn-download{
  background:linear-gradient(135deg,#b8860b,var(--gold),#c9a84c);
  background-size:200% 200%;
  color:#fff;
  box-shadow:0 4px 20px rgba(201,168,76,.35);
  animation:gradShift 4s ease infinite;
}
@keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.btn-download:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(201,168,76,.5);}
.btn-download:active{transform:translateY(-1px);}

/* ─── LOADING OVERLAY ─── */
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,8,20,.75);
  backdrop-filter:blur(6px);
  z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:18px;
}
.loading-overlay.show{display:flex;}
.spinner-ring{
  width:52px;height:52px;
  border:3px solid rgba(201,168,76,.2);
  border-top-color:var(--gold2);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{
  font-family:'Noto Serif KR',serif;
  font-size:.95rem;color:rgba(255,255,255,.7);
  letter-spacing:.1em;
}

/* ─── SUCCESS TOAST ─── */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#1a2a0a,#2a3e10);
  border:1px solid rgba(100,200,50,.4);
  color:#90e050;
  font-family:'Noto Serif KR',serif;
  font-size:.88rem;padding:12px 28px;
  border-radius:30px;
  box-shadow:0 8px 28px rgba(0,0,0,.4);
  z-index:300;
  transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s;
  opacity:0;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ─── PARTICLES ─── */
#particleCanvas{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
}

/* ─── SCROLL PROGRESS ─── */
.scroll-bar{
  position:fixed;top:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  z-index:500;transition:width .1s;
  box-shadow:0 0 8px rgba(201,168,76,.6);
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>
<div class="scroll-bar" id="scrollBar"></div>

<!-- ─── HERO ─── -->
<div class="hero">
  <div class="hero-badge">학생회 금연 캠페인 2026</div>
  <h1 class="hero-title">금&nbsp;&nbsp;연<br/><span>서&nbsp;&nbsp;약&nbsp;&nbsp;서</span></h1>
  <p class="hero-sub">나와 우리 모두를 위한 작은 약속</p>
  <div class="hero-line"><div class="hero-line-diamond"></div></div>
</div>

<!-- ─── CARD ─── -->
<div class="card-wrap">
  <div class="pledge-card" id="pledgeCard">
    <div class="card-pattern"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="card-org">학생회 공식 서약 프로그램</div>
    <div class="card-title">금 연 서 약 서</div>
    <div class="card-divider"><span class="card-divider-icon">✦</span></div>

    <p class="card-body">
      나는 나 자신과 사랑하는 사람들의 건강을 지키기 위하여,
      흡연이 가져오는 모든 해악을 깊이 인식하고,
      오늘 이 자리에서 금연을 엄숙히 서약합니다.
    </p>

    <div class="field-row">
      <span class="field-label">이&nbsp;&nbsp;&nbsp;름</span>
      <input class="field-input" id="nameInput" type="text" placeholder="홍길동" maxlength="20"/>
    </div>

    <p class="memo-label">나만의 다짐 한 마디 <span style="opacity:.6">(선택)</span></p>
    <textarea class="field-textarea" id="memoInput" placeholder="예) 가족의 건강을 위해, 더 나은 내일을 위해..."></textarea>

    <div class="pledge-closing" id="closingText">
      저는 오늘부터 담배를 완전히 끊고<br/>
      건강하고 깨끗한 삶을 살아가겠습니다.
    </div>

    <div class="bottom-row">
      <div class="date-text"><input class="field-input date-input" id="dateInput" type="text" placeholder="2026년 05월 20일" style="min-width:150px;font-size:.88rem;color:#7a6630;"/></div>
      <div class="sign-item">
        <span class="field-label">서약인</span>
        <input class="field-input" id="signInput" type="text" placeholder="서명"/>
      </div>
    </div>

    <div class="seal">학생회<br/>인(印)</div>
  </div>
</div>

<!-- ─── BUTTONS ─── -->
<div class="actions">
  <button class="btn btn-reset" onclick="resetForm()">초기화</button>
  <button class="btn btn-download" id="downloadBtn" onclick="downloadJpg()">서약 완료</button>
</div>

<!-- ─── LOADING ─── -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-ring"></div>
  <div class="loading-text">서약서를 생성하는 중...</div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast">✅ 서약서가 저장되었습니다!</div>

<script>
/* ── 날짜 기본값 ── */
(function(){
  const d=new Date();
  document.getElementById('dateInput').value=
    `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일`;
})();

/* ── 스크롤 바 ── */
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const pct=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100||0;
  document.getElementById('scrollBar').style.width=pct+'%';
});

/* ── 별 캔버스 ── */
(function(){
  const c=document.getElementById('starCanvas');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;init();}
  function init(){
    stars=[];
    for(let i=0;i<160;i++){
      stars.push({
        x:Math.random()*c.width,y:Math.random()*c.height,
        r:Math.random()*1.2+.2,
        a:Math.random(),da:(Math.random()-.5)*.008,
        speed:Math.random()*.15+.05
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da;
      if(s.a<=0||s.a>=1)s.da*=-1;
      s.y+=s.speed;
      if(s.y>c.height)s.y=0;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,245,200,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

/* ── 파티클 캔버스 (연기 느낌 부유 입자) ── */
(function(){
  const c=document.getElementById('particleCanvas');
  const ctx=c.getContext('2d');
  let pts=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  function init(){
    pts=[];
    for(let i=0;i<30;i++){
      pts.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*3+1,
        vx:(Math.random()-.5)*.3,
        vy:-(Math.random()*.4+.1),
        a:Math.random()*.12+.03
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-10)p.y=c.height+10;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();init();draw();
})();

/* ── 초기화 ── */
function resetForm(){
  document.getElementById('nameInput').value='';
  document.getElementById('memoInput').value='';
  document.getElementById('signInput').value='';
  const d=new Date();
  document.getElementById('dateInput').value=`${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일`;
}

/* ── 폭죽 파티클 효과 ── */
function launchCelebration(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const colors=['#c9a84c','#f0d080','#fff5cc','#ffd700','#ffe066','#90e050','#80cfff','#ff8fa0'];
  const particles=[];

  // 여러 위치에서 폭죽 발사
  const origins=[
    {x:canvas.width*0.25,y:canvas.height*0.45},
    {x:canvas.width*0.5, y:canvas.height*0.35},
    {x:canvas.width*0.75,y:canvas.height*0.45},
  ];

  origins.forEach((o,oi)=>{
    setTimeout(()=>{
      for(let i=0;i<80;i++){
        const angle=Math.random()*Math.PI*2;
        const speed=Math.random()*7+2;
        particles.push({
          x:o.x,y:o.y,
          vx:Math.cos(angle)*speed,
          vy:Math.sin(angle)*speed-4,
          r:Math.random()*4+2,
          color:colors[Math.floor(Math.random()*colors.length)],
          alpha:1,
          gravity:0.18,
          decay:Math.random()*.012+.008,
          shape:Math.random()>.5?'circle':'rect',
          rot:Math.random()*360,
          rotV:(Math.random()-.5)*8
        });
      }
    },oi*180);
  });

  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.vy+=p.gravity;
      p.x+=p.vx;p.y+=p.vy;
      p.vx*=0.98;
      p.alpha-=p.decay;
      p.rot+=p.rotV;
      if(p.alpha<=0)return;
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      if(p.shape==='circle'){
        ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();
      } else {
        ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      }
      ctx.restore();
    });
    frame++;
    if(frame<200)requestAnimationFrame(animate);
    else{canvas.remove();}
  }
  animate();

  // 버튼 펄스 효과
  const btn=document.getElementById('downloadBtn');
  btn.style.transform='scale(1.12)';
  btn.style.boxShadow='0 0 40px rgba(201,168,76,.9)';
  setTimeout(()=>{btn.style.transform='';btn.style.boxShadow='';},400);
}

/* ── 토스트 ── */
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── JPG 다운로드 (Canvas 직접 드로잉) ── */
async function downloadJpg(){
  const name    = document.getElementById('nameInput').value.trim() || '서약자';
  const memo    = document.getElementById('memoInput').value.trim();
  const sign    = document.getElementById('signInput').value.trim();
  const date    = document.getElementById('dateInput').value.trim();

  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');

  await new Promise(r=>setTimeout(r,60)); // 오버레이 렌더 대기

  try{
    const W=900, PAD=64;
    // 내용에 따라 높이 동적 계산
    const memoLines = memo ? wrapText(null, memo, W-PAD*2-20, 18) : [];
    const H = 760 + memoLines.length*30;

    const cv=document.createElement('canvas');
    cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d');

    /* ── 배경 ── */
    const bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#fdf8ee'); bg.addColorStop(1,'#f5e9c8');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    /* ── 도트 패턴 ── */
    ctx.fillStyle='rgba(201,168,76,0.07)';
    for(let x=0;x<W;x+=28) for(let y=0;y<H;y+=28){
      ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
    }

    /* ── 외곽 테두리 ── */
    ctx.strokeStyle='#c9a84c'; ctx.lineWidth=2.5;
    ctx.strokeRect(18,18,W-36,H-36);
    ctx.strokeStyle='rgba(201,168,76,0.35)'; ctx.lineWidth=1;
    ctx.strokeRect(26,26,W-52,H-52);

    /* ── 모서리 장식 ── */
    const corners=[[32,32],[W-32,32],[32,H-32],[W-32,H-32]];
    ctx.strokeStyle='#c9a84c'; ctx.lineWidth=2;
    corners.forEach(([cx,cy])=>{
      const s=22, sg=[[1,1],[-1,1],[1,-1],[-1,-1]];
      const [[dx,dy]]=sg.filter(([a,b])=>a==Math.sign(W/2-cx)&&b==Math.sign(H/2-cy));
      ctx.beginPath();ctx.moveTo(cx,cy+dy*s);ctx.lineTo(cx,cy);ctx.lineTo(cx+dx*s,cy);ctx.stroke();
    });

    /* 글꼴 로드 대기 */
    await document.fonts.ready;

    /* ── 단체명 ── */
    ctx.fillStyle='#c9a84c';
    ctx.font='14px "Nanum Myeongjo"';
    ctx.textAlign='center';
    ctx.letterSpacing='6px';
    ctx.fillText('학생회 공식 서약 프로그램', W/2, 80);
    ctx.letterSpacing='0px';

    /* ── 제목 ── */
    ctx.fillStyle='#1a1a2e';
    ctx.font='bold 48px "Nanum Myeongjo"';
    ctx.textAlign='center';
    ctx.fillText('금  연  서  약  서', W/2, 148);

    /* ── 제목 하단 라인 ── */
    const lg=ctx.createLinearGradient(W*0.2,0,W*0.8,0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'#c9a84c'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(W*0.2,168);ctx.lineTo(W*0.8,168);ctx.stroke();
    ctx.fillStyle='#c9a84c';
    ctx.font='14px serif'; ctx.textAlign='center';
    ctx.fillText('✦', W/2, 182);

    /* ── 본문 ── */
    ctx.fillStyle='#3a3020';
    ctx.font='18px "Noto Serif KR", serif';
    ctx.textAlign='center';
    const bodyLines=[
      '나는 나 자신과 사랑하는 사람들의 건강을 지키기 위하여,',
      '흡연이 가져오는 모든 해악을 깊이 인식하고,',
      '오늘 이 자리에서 금연을 엄숙히 서약합니다.'
    ];
    bodyLines.forEach((l,i)=>ctx.fillText(l, W/2, 220+i*36));

    /* ── 이름 필드 ── */
    let y=340;
    ctx.textAlign='left'; ctx.fillStyle='#1a1a2e';
    ctx.font='18px "Nanum Myeongjo"';
    ctx.fillText('이  름', PAD, y);
    ctx.fillText(name, PAD+80, y);
    ctx.strokeStyle='rgba(100,80,20,0.35)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD+72,y+4);ctx.lineTo(W-PAD,y+4);ctx.stroke();

    /* ── 메모 ── */
    y+=46;
    ctx.fillStyle='#7a6630'; ctx.font='14px "Noto Serif KR"';
    ctx.fillText('나만의 다짐 한 마디', PAD, y);
    y+=10;
    ctx.strokeStyle='rgba(201,168,76,0.4)'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.strokeRect(PAD, y, W-PAD*2, memoLines.length>0 ? memoLines.length*30+20 : 60);
    ctx.setLineDash([]);
    if(memo){
      ctx.fillStyle='#1a1a2e'; ctx.font='17px "Noto Serif KR"';
      memoLines.forEach((ln,i)=>ctx.fillText(ln, PAD+12, y+32+i*30));
      y += memoLines.length*30+28;
    } else { y+=68; }

    /* ── 결문 박스 ── */
    y+=16;
    const boxH=90;
    const boxGrad=ctx.createLinearGradient(PAD,y,W-PAD,y+boxH);
    boxGrad.addColorStop(0,'rgba(201,168,76,0.10)');
    boxGrad.addColorStop(1,'rgba(201,168,76,0.04)');
    ctx.fillStyle=boxGrad;
    ctx.fillRect(PAD,y,W-PAD*2,boxH);
    ctx.strokeStyle='rgba(201,168,76,0.55)'; ctx.lineWidth=1;
    ctx.strokeRect(PAD,y,W-PAD*2,boxH);
    ctx.fillStyle='#1a1a2e';
    ctx.font='bold 20px "Nanum Myeongjo"';
    ctx.textAlign='center';
    ctx.fillText('저는 오늘부터 담배를 완전히 끊고', W/2, y+32);
    ctx.fillText('건강하고 깨끗한 삶을 살아가겠습니다.', W/2, y+64);

    /* ── 날짜 & 서명 ── */
    y += boxH+36;
    ctx.textAlign='left'; ctx.font='16px "Nanum Myeongjo"'; ctx.fillStyle='#7a6630';
    ctx.fillText(date||'', PAD, y);
    ctx.fillStyle='#1a1a2e'; ctx.font='18px "Nanum Myeongjo"';
    ctx.textAlign='right';
    ctx.fillText('서약인', W-PAD-130, y);
    ctx.fillText(sign, W-PAD, y);
    ctx.strokeStyle='rgba(100,80,20,0.3)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W-PAD-120,y+4);ctx.lineTo(W-PAD,y+4);ctx.stroke();

    /* ── 도장 ── */
    const sx=W-PAD-30, sy=y-20;
    ctx.save();
    ctx.translate(sx,sy);ctx.rotate(-0.24);
    ctx.strokeStyle='rgba(181,43,39,0.72)'; ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(181,43,39,0.72)';
    ctx.font='bold 13px "Nanum Myeongjo"';
    ctx.textAlign='center';
    ctx.fillText('학생회',0,-5);ctx.fillText('인(印)',0,12);
    ctx.restore();

    /* ── 다운로드 ── */
    const dataURL=cv.toDataURL('image/jpeg',0.95);
    const a=document.createElement('a');
    a.href=dataURL;
    a.download=`금연서약서_${name}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // 구글 시트에 자동 제출
    const dateVal = document.getElementById('dateInput').value.trim();
    fetch('https://script.google.com/macros/s/AKfycbwHonGTxFLSaLV7I6geEzVTQJHKxzxvizE5_cFKz6DbvEeHexPjO_J-EiSUFW5pdslIXQ/exec', {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, date: dateVal, image: dataURL}),
    }).catch(()=>{});

    overlay.classList.remove('show');
    launchCelebration();
    showToast();

  }catch(e){
    overlay.classList.remove('show');
    alert('저장 중 오류가 발생했습니다: '+e.message);
  }
}

/* ── 텍스트 줄바꿈 헬퍼 ── */
function wrapText(ctx, text, maxW, fontSize){
  // ctx 없이 글자수 기준으로 대략 계산
  const charsPerLine = Math.floor(maxW / (fontSize*0.6));
  const words = text.split('');
  const lines=[]; let line='';
  words.forEach(ch=>{
    if(line.length>=charsPerLine){lines.push(line);line=ch;}
    else line+=ch;
  });
  if(line)lines.push(line);
  return lines;
}
</script>
